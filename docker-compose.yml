services:
  pdfora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfora-app
    ports:
      - "8080:80"
    profiles:
      - prod

  pdfora-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pdfora-dev
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    profiles:
      - dev
