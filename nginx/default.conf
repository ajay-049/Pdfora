server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # For React Router or any SPA routing:
    # if /about or /merge-pdf is requested directly, serve index.html
    # so the frontend router can decide what page to render.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable static assets aggressively.
    # Vite fingerprints filenames, so long caching is safe here.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
